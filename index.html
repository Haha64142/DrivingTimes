<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Driving Times</title>
    <style>
      html,
      body {
        font-family: sans-serif;
        background: black;
        color: white;
      }

      button {
        font-size: 2em;
        color: white;
        border: none;
        border-radius: 0.25em;
        min-width: 5em;
        padding-inline: 10px;
        cursor: pointer;
        transition:
          background-color 0.12s ease,
          transform 0.05s ease;
      }

      button:active {
        transform: translateY(1px);
      }

      .start {
        background-color: #f4a259;
      }

      .start:hover {
        background-color: #e89543;
      }

      .start:active {
        background-color: #d8822d;
      }

      .stop {
        background-color: #d9534f;
      }

      .stop:hover {
        background-color: #c9433e;
      }

      .stop:active {
        background-color: #b73833;
      }

      .stop-night {
        background-color: #14b8a6;
      }

      .stop-night:hover {
        background-color: #0d9c8d;
      }

      .stop-night:active {
        background-color: #0b8c80;
      }

      .get {
        color: #202020;
        background-color: #f0f0f0;
      }

      .get:hover {
        background-color: #d0d0d0;
      }

      .get:active {
        background-color: #b0b0b0;
      }

      #out {
        white-space: pre-wrap;
      }
    </style>
  </head>

  <body>
    <button class="start" onclick="start()">Start</button>
    <button class="stop" onclick="stop()">Stop</button>
    <button class="stop-night" onclick="stop(true)">Stop Night</button>
    <button class="get" onclick="getTimes()">Get Times</button>
    <p id="out"></p>

    <script type="text/javascript">
      const url =
        "https://script.google.com/macros/s/AKfycbwcMxA9Te4y5oaz6vz69zmNRjptcpNhitDMgCHGw2TL24ADyfVZ9LTcmpkLzc7I43Nv/exec";
      const out = document.getElementById("out");
      let outList = [];
      function output(text) {
        console.log(text);
        outList.push(text);
        out.textContent = outList.join("\n");
        setTimeout(() => {
          outList.shift();
          out.textContent = outList.join("\n");
        }, 5000);
      }
      async function getTimes() {
        const resp = await fetch(`${url}?method=get`);
        const text = await resp.text();
        output(text);
      }
      async function start() {
        const resp = await fetch(`${url}?method=start`);
        const text = await resp.text();
        output(text);
      }
      async function stop(night = false) {
        const resp = await fetch(`${url}?method=stop&data={"night":${night}}`);
        const text = await resp.text();
        output(text);
        await getTimes();
      }
    </script>
  </body>
</html>
